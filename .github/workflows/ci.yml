name: TrailBlaze AI CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  backend-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install core deps
        run: pip install fastapi motor pymongo python-dotenv
      - name: Python syntax check
        run: |
          find backend -name "*.py" -exec python -m py_compile {} \;
          find data_engineering -name "*.py" -exec python -m py_compile {} \;
          echo "Python syntax OK"

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: Install deps
        run: cd frontend/nextjs-app && npm install
      - name: TypeScript check
        run: cd frontend/nextjs-app && npx tsc --noEmit
